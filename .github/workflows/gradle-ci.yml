name: Maven CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: wanderfalcao/ufotracker

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MAVEN_OPTS: "-Xmx1024m"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build com Maven
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          chmod +x mvnw
          echo "::notice::Iniciando build do ufoTracker"
          ./mvnw package -DskipTests -q
          echo "::notice::Build concluido com sucesso"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ufotracker-jar
          path: target/ufoTracker-0.0.1-SNAPSHOT.jar
          retention-days: 7

      - name: Gerar Step Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Build OK |" >> $GITHUB_STEP_SUMMARY

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    env:
      DEPLOY_ENV: ${{ vars.DEPLOY_ENV }}
    steps:
      - name: Verificar configuracao
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$DEPLOY_ENV" ]; then
            echo "::error::Variavel DEPLOY_ENV nao configurada no environment"
            exit 1
          fi
          echo "::notice::Deploy autorizado para o ambiente $DEPLOY_ENV"

      - name: Executar deploy
        run: |
          echo "Realizando deploy da imagem $IMAGE_NAME para $DEPLOY_ENV"
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Ambiente | \`$DEPLOY_ENV\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Imagem | \`$IMAGE_NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Deploy OK |" >> $GITHUB_STEP_SUMMARY
